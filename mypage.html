<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ | サイトウフーズ</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --yellow: #F5C200;
    --yellow-dark: #e0af00;
    --yellow-light: #fff8d6;
    --orange: #e07c00;
    --brown: #5c3a0a;
    --white: #ffffff;
    --border: #e8d88a;
    --text: #3a2400;
    --muted: #997755;
    --ok: #1a9a5c;
    --red: #d43c3c;
    --red-dim: rgba(212,60,60,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'M PLUS Rounded 1c', sans-serif; background: var(--yellow-light); color: var(--text); min-height: 100vh; padding-bottom: 48px; }
  header { background: var(--yellow); padding: 0 16px; height: 72px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--yellow-dark); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .logo-wrap { display: flex; align-items: center; gap: 12px; }
  .logo-icon { font-size: 32px; }
  .logo-main { font-size: 18px; font-weight: 800; color: var(--brown); letter-spacing: 0.03em; }
  .logo-sub { font-size: 10px; font-weight: 500; color: var(--orange); letter-spacing: 0.06em; }
  .logout-btn { padding: 6px 14px; border: 1.5px solid var(--brown); border-radius: 20px; background: transparent; color: var(--brown); font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; display: none; }

  .container { max-width: 480px; margin: 0 auto; padding: 28px 16px; }

  .card { background: var(--white); border-radius: 16px; padding: 22px; margin-bottom: 18px; border: 1.5px solid var(--border); box-shadow: 0 2px 12px rgba(200,160,0,0.1); }
  .card-title { font-size: 13px; font-weight: 700; color: var(--orange); letter-spacing: 0.05em; margin-bottom: 14px; }

  .auth-tabs { display: flex; gap: 4px; margin-bottom: 18px; background: var(--yellow-light); border-radius: 10px; padding: 4px; }
  .auth-tab-btn { flex: 1; padding: 9px; border: none; border-radius: 8px; background: transparent; color: var(--brown); font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .auth-tab-btn.active { background: var(--yellow); }
  .auth-panel-inner { display: none; }
  .auth-panel-inner.active { display: block; }

  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--brown); margin-bottom: 6px; }
  .form-input { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: inherit; color: var(--text); background: var(--white); outline: none; }
  .form-input:focus { border-color: var(--yellow-dark); }
  .form-hint { font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.6; }

  .password-field { position: relative; }
  .password-field .form-input { padding-right: 44px; }
  .password-toggle-btn {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; font-size: 18px; padding: 6px;
    color: var(--muted); line-height: 1;
  }
  .password-toggle-btn:hover { color: var(--brown); }

  .submit-btn { width: 100%; background: var(--yellow); color: var(--brown); border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 800; font-family: inherit; cursor: pointer; box-shadow: 0 4px 12px rgba(200,160,0,0.3); }
  .submit-btn:hover { background: var(--yellow-dark); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .auth-msg { margin-top: 12px; font-size: 13px; padding: 10px 12px; border-radius: 8px; display: none; }
  .auth-msg.error { display: block; background: var(--red-dim); color: var(--red); }
  .auth-msg.success { display: block; background: #e6fff5; color: var(--ok); }

  #mypage-main { display: none; }

  .welcome { font-size: 15px; font-weight: 700; margin-bottom: 4px; }

  .point-box { text-align: center; padding: 10px 0; }
  .point-num { font-size: 40px; font-weight: 800; color: var(--orange); line-height: 1; }
  .point-label { font-size: 12px; color: var(--muted); margin-top: 6px; }

  .order-card { border: 1.5px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; background: #fffdf5; }
  .order-card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
  .order-date { font-size: 14px; font-weight: 700; color: var(--brown); }
  .order-time { font-size: 11px; color: var(--muted); }
  .order-items-list { font-size: 12px; color: var(--text); line-height: 1.8; margin-bottom: 8px; }
  .order-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 8px; border-top: 1px dashed var(--border); }
  .order-total { font-size: 15px; font-weight: 800; color: var(--orange); }

  .status-badge { display: inline-block; font-size: 10px; padding: 3px 9px; border-radius: 999px; font-weight: 700; }
  .status-completed { background: #e6fff5; color: var(--ok); }
  .status-cancelled { background: #eee; color: #777; }
  .status-pending { background: var(--yellow-light); color: var(--orange); border: 1px solid var(--border); }

  .empty-state { text-align: center; padding: 30px 10px; color: var(--muted); font-size: 13px; }
  .loading { text-align: center; padding: 20px; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-icon">🛵</div>
    <div>
      <div class="logo-main">マイページ</div>
      <div class="logo-sub">SAITO FOODS CO.,LTD.</div>
    </div>
  </div>
  <button class="logout-btn" id="logout-btn" onclick="logout()">ログアウト</button>
</header>

<div class="container">

  <div id="auth-panel">
    <div class="card">
      <div class="auth-tabs">
        <button class="auth-tab-btn active" id="tab-login" onclick="switchAuthTab('login')">ログイン</button>
        <button class="auth-tab-btn" id="tab-signup" onclick="switchAuthTab('signup')">初めての方</button>
      </div>

      <div class="auth-panel-inner active" id="panel-login">
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" class="form-input" id="login-email" placeholder="taro@example.com">
        </div>
        <div class="form-group">
          <label>パスワード</label>
          <div class="password-field">
            <input type="password" class="form-input" id="login-password">
            <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('login-password', this)">👁</button>
          </div>
        </div>
        <button class="submit-btn" id="login-btn" onclick="login()">ログイン</button>
        <div style="text-align:center;margin-top:12px;">
          <a href="#" style="font-size:12px;color:var(--muted);text-decoration:underline;" onclick="switchAuthTab('forgot');return false;">パスワードをお忘れですか？</a>
        </div>
      </div>

      <!-- パスワード再設定リクエスト -->
      <div class="auth-panel-inner" id="panel-forgot">
        <div class="form-hint" style="margin-bottom:14px;">
          ご登録のメールアドレスを入力してください。パスワード再設定用のリンクをお送りします。
        </div>
        <div class="form-group">
          <label>メールアドレス</label>
          <input type="email" class="form-input" id="forgot-email" placeholder="taro@example.com">
        </div>
        <button class="submit-btn" id="forgot-btn" onclick="requestPasswordReset()">再設定メールを送る</button>
        <div style="text-align:center;margin-top:12px;">
          <a href="#" style="font-size:12px;color:var(--muted);text-decoration:underline;" onclick="switchAuthTab('login');return false;">ログインに戻る</a>
        </div>
      </div>

      <!-- 新しいパスワードの設定(再設定メールのリンクから戻ってきた場合に表示) -->
      <div class="auth-panel-inner" id="panel-reset">
        <div class="form-hint" style="margin-bottom:14px;">新しいパスワードを設定してください。</div>
        <div class="form-group">
          <label>新しいパスワード</label>
          <input type="password" class="form-input" id="reset-password" placeholder="6文字以上">
        </div>
        <div class="form-group">
          <label>パスワード(確認)</label>
          <input type="password" class="form-input" id="reset-password-confirm">
        </div>
        <button class="submit-btn" id="reset-btn" onclick="submitNewPassword()">パスワードを更新する</button>
      </div>

      <div class="auth-panel-inner" id="panel-signup">
        <div class="form-hint" style="margin-bottom:14px;">
          ご登録済みのメールアドレスで、初めてログインするためのパスワードを設定してください。
          <br>これまでのご注文履歴・ポイント残高がそのまま引き継がれます。
        </div>
        <div class="form-group">
          <label>ご登録のメールアドレス</label>
          <input type="email" class="form-input" id="signup-email" placeholder="taro@example.com">
        </div>
        <div class="form-group">
          <label>新しいパスワード</label>
          <div class="password-field">
            <input type="password" class="form-input" id="signup-password" placeholder="6文字以上">
            <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('signup-password', this)">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label>パスワード(確認)</label>
          <div class="password-field">
            <input type="password" class="form-input" id="signup-password-confirm">
            <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('signup-password-confirm', this)">👁</button>
          </div>
        </div>
        <button class="submit-btn" id="signup-btn" onclick="signup()">パスワードを設定する</button>
      </div>

      <div class="auth-msg" id="auth-msg"></div>
    </div>
  </div>

  <div id="mypage-main">
    <div class="card">
      <div class="welcome" id="welcome-name"></div>
      <div class="point-box">
        <div class="point-num" id="point-balance">0</div>
        <div class="point-label">保有ポイント / Points Balance</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📦 ご注文履歴 / Order History</div>
      <div id="order-list">
        <div class="loading">読み込み中...</div>
      </div>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://sdjgmgyghnlpqydrnllj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_GzbK9P2cp7FPFxrnyBjVug_IMCbjOpk';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentCustomer = null;

function togglePasswordVisibility(inputId, btn) {
  const input = document.getElementById(inputId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.textContent = isHidden ? '🙈' : '👁';
}

function switchAuthTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('panel-login').classList.toggle('active', tab === 'login');
  document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('panel-forgot').classList.toggle('active', tab === 'forgot');
  document.getElementById('panel-reset').classList.toggle('active', tab === 'reset');
  document.querySelector('.auth-tabs').style.display = (tab === 'forgot' || tab === 'reset') ? 'none' : 'flex';
  hideAuthMsg();
}

function showAuthMsg(msg, isError) {
  const el = document.getElementById('auth-msg');
  el.textContent = msg;
  el.className = 'auth-msg ' + (isError ? 'error' : 'success');
}
function hideAuthMsg() {
  const el = document.getElementById('auth-msg');
  el.textContent = '';
  el.className = 'auth-msg';
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  hideAuthMsg();

  if (!email || !password) { showAuthMsg('メールアドレスとパスワードを入力してください。', true); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true;

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  btn.disabled = false;

  if (error) { showAuthMsg('ログインに失敗しました: ' + error.message, true); return; }
  await loadMyPage(data.user);
}

async function signup() {
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const confirm = document.getElementById('signup-password-confirm').value;
  hideAuthMsg();

  if (!email || !password) { showAuthMsg('メールアドレスとパスワードを入力してください。', true); return; }
  if (password.length < 6) { showAuthMsg('パスワードは6文字以上にしてください。', true); return; }
  if (password !== confirm) { showAuthMsg('パスワードが一致しません。', true); return; }

  const btn = document.getElementById('signup-btn');
  btn.disabled = true;

  const { data, error } = await supabaseClient.auth.signUp({ email, password });
  btn.disabled = false;

  if (error) { showAuthMsg('登録に失敗しました: ' + error.message, true); return; }

  if (!data.session) {
    showAuthMsg('確認メールをお送りしました。メール内のリンクをクリックした後、改めて「ログイン」タブからログインしてください。');
    return;
  }

  await claimCustomerRecord(email, data.user.id);
}

async function claimCustomerRecord(email, userId) {
  const { data, error } = await supabaseClient
    .from('customers')
    .update({ auth_user_id: userId })
    .eq('email', email)
    .is('auth_user_id', null)
    .select('id');

  if (error) {
    showAuthMsg('アカウントは作成されましたが、既存のご注文履歴との連携に失敗しました。お手数ですが店舗までご連絡ください。', true);
    return;
  }

  if (!data || data.length === 0) {
    showAuthMsg('このメールアドレスでの過去のご注文履歴は見つかりませんでした。アカウントは作成されましたので、これから先のご注文からポイントが貯まります。');
  }

  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) await loadMyPage(session.user);
}

async function requestPasswordReset() {
  const email = document.getElementById('forgot-email').value.trim();
  hideAuthMsg();
  if (!email) { showAuthMsg('メールアドレスを入力してください。', true); return; }

  const btn = document.getElementById('forgot-btn');
  btn.disabled = true;

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: location.href.split('#')[0].split('?')[0],
  });
  btn.disabled = false;

  if (error) { showAuthMsg('送信に失敗しました: ' + error.message, true); return; }
  showAuthMsg('パスワード再設定用のメールをお送りしました。メール内のリンクを開いてください。');
}

async function submitNewPassword() {
  const password = document.getElementById('reset-password').value;
  const confirm = document.getElementById('reset-password-confirm').value;
  hideAuthMsg();

  if (password.length < 6) { showAuthMsg('パスワードは6文字以上にしてください。', true); return; }
  if (password !== confirm) { showAuthMsg('パスワードが一致しません。', true); return; }

  const btn = document.getElementById('reset-btn');
  btn.disabled = true;

  const { error } = await supabaseClient.auth.updateUser({ password });
  btn.disabled = false;

  if (error) { showAuthMsg('更新に失敗しました: ' + error.message, true); return; }

  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) await loadMyPage(session.user);
}

// パスワード再設定メールのリンクから戻ってきた場合、自動的に「新しいパスワード」入力画面を表示する
supabaseClient.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    document.getElementById('auth-panel').style.display = 'block';
    document.getElementById('mypage-main').style.display = 'none';
    switchAuthTab('reset');
  }
});

async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

(async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session) await loadMyPage(session.user);
})();

async function loadMyPage(user) {
  let { data: customerRow, error } = await supabaseClient
    .from('customers')
    .select('id, family_name, first_name, point_balance')
    .eq('auth_user_id', user.id)
    .single();

  // まだ紐付けが行われていない場合(確認メールのリンクをクリックして初めて
  // ここに来たケースなど)、メールアドレスが一致する既存の顧客レコードへの紐付けを試みる
  if ((error || !customerRow) && user.email) {
    await supabaseClient
      .from('customers')
      .update({ auth_user_id: user.id })
      .eq('email', user.email)
      .is('auth_user_id', null);

    const retry = await supabaseClient
      .from('customers')
      .select('id, family_name, first_name, point_balance')
      .eq('auth_user_id', user.id)
      .single();
    customerRow = retry.data;
    error = retry.error;
  }

  if (error || !customerRow) {
    showAuthMsg('このアカウントはまだお客様情報と連携していません。お手数ですが店舗までご連絡ください。', true);
    return;
  }

  currentCustomer = customerRow;

  document.getElementById('auth-panel').style.display = 'none';
  document.getElementById('mypage-main').style.display = 'block';
  document.getElementById('logout-btn').style.display = 'inline-block';

  const name = `${customerRow.family_name || ''} ${customerRow.first_name || ''}`.trim();
  document.getElementById('welcome-name').innerHTML = `${name} 様、いつもありがとうございます。`;
  document.getElementById('point-balance').textContent = customerRow.point_balance ?? 0;

  await loadOrderHistory(customerRow.id);
}

async function loadOrderHistory(customerId) {
  const listEl = document.getElementById('order-list');
  listEl.innerHTML = '<div class="loading">読み込み中...</div>';

  const { data, error } = await supabaseClient
    .from('orders')
    .select(`
      id, delivery_date, delivery_time_slot, payment_method, payment_status,
      is_completed, is_cancelled, total_amount,
      order_items ( product_name_snapshot, quantity, sale_type, total_price )
    `)
    .eq('customer_id', customerId)
    .order('delivery_date', { ascending: false })
    .limit(50);

  if (error) { listEl.innerHTML = '<div class="empty-state">読み込みに失敗しました: ' + error.message + '</div>'; return; }

  if (!data || data.length === 0) {
    listEl.innerHTML = '<div class="empty-state">まだご注文履歴がありません。</div>';
    return;
  }

  listEl.innerHTML = '';
  data.forEach(order => listEl.appendChild(renderOrderCard(order)));
}

function renderOrderCard(order) {
  const div = document.createElement('div');
  div.className = 'order-card';

  let statusHtml = '';
  if (order.is_cancelled) {
    statusHtml = '<span class="status-badge status-cancelled">キャンセル済み</span>';
  } else if (order.is_completed) {
    statusHtml = '<span class="status-badge status-completed">お届け完了</span>';
  } else {
    statusHtml = '<span class="status-badge status-pending">準備中</span>';
  }

  const itemsHtml = (order.order_items || []).map(item => {
    const qty = item.sale_type === 'weight' ? `${item.quantity}` : `${item.quantity}点`;
    return `${item.product_name_snapshot} × ${qty} — ${item.total_price} THB`;
  }).join('<br>');

  div.innerHTML = `
    <div class="order-card-header">
      <div>
        <div class="order-date">${order.delivery_date || '-'}</div>
        <div class="order-time">${order.delivery_time_slot || ''}</div>
      </div>
      ${statusHtml}
    </div>
    <div class="order-items-list">${itemsHtml || '(商品情報なし)'}</div>
    <div class="order-footer">
      <span style="font-size:12px;color:var(--muted);">${order.payment_method === 'qr' ? 'QR振込み' : '現金'}</span>
      <span class="order-total">${order.total_amount || 0} THB</span>
    </div>
  `;
  return div;
}
</script>

</body>
</html>
